<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar Serviço</title>

<style>
/* =========================
   RESET
========================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

/* =========================
   FUNDO
========================= */
body{
    background:wheat;
    color:#333;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:30px;
}

/* =========================
   CARD
========================= */
.card{
    width:100%;
    max-width:500px;
    background:white;
    border-radius:18px;
    padding:30px;
    box-shadow:0 10px 25px rgba(0,0,0,.12);
}

/* =========================
   TÍTULO
========================= */
.card h2{
    text-align:center;
    color:sienna;
    font-size:22px;
    margin-bottom:25px;
    font-weight:600;
}

/* =========================
   LABEL
========================= */
label{
    display:block;
    margin:12px 0 6px;
    color:#555;
    font-size:14px;
}

/* =========================
   CAMPOS
========================= */
input{
    width:100%;
    padding:13px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:14px;
    transition:.2s;
}

input:focus{
    outline:none;
    border-color:sienna;
    box-shadow:0 0 0 3px rgba(160,82,45,.15);
}

/* =========================
   BOTÕES
========================= */
button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:15px;
    transition:.25s;
}

/* BOTÃO SALVAR */
.btn-primary{
    background:sienna;
    color:white;
    margin-top:22px;
}

.btn-primary:hover{
    opacity:.9;
    transform:translateY(-2px);
}

/* BOTÃO CANCELAR */
.btn-secondary{
    background:#f3f3f3;
    color:#444;
    border:1px solid #ddd;
    margin-top:10px;
}

.btn-secondary:hover{
    background:#e8e8e8;
}

/* =========================
   LINK
========================= */
a{
    text-decoration:none;
}

</style>

</head>

<body>

<div class="card">

<h2>Editar Serviço</h2>
<form method="POST" action="/update_servico/{{ servico[0] }}">

    <label for="nome">Nome do Serviço</label>
    <input
        type="text"
        id="nome"
        name="nome"
        value="{{ servico[1] }}"
        required>

    <label for="valor">Valor (R$)</label>
    <input
        type="number"
        step="0.01"
        id="valor"
        name="valor"
        value="{{ servico[2] }}"
        required>

    <button type="submit" class="btn-primary">
        Salvar Alterações
    </button>

</form>

<a href="/#servicos">
    <button type="button" class="btn-secondary">
        Cancelar
    </button>
</a>

</div>

</body>
</html>
