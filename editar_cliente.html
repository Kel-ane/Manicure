<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar Cliente</title>

<style>
/* =========================
   RESET
========================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

/* =========================
   FUNDO
========================= */
body{
    background:wheat;
    color:#333;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:30px;
}

/* =========================
   CARD
========================= */
.card{
    width:100%;
    max-width:500px;   /* Apenas maior que o do serviço */
    background:white;
    border-radius:18px;
    padding:28px;
    box-shadow:0 10px 25px rgba(0,0,0,.12);
}

/* =========================
   TÍTULO
========================= */
.card h2{
    text-align:center;
    color:sienna;
    font-size:22px;
    margin-bottom:22px;
    font-weight:600;
}

/* =========================
   LABEL
========================= */
label{
    display:block;
    margin:12px 0 6px;
    color:#555;
    font-size:14px;
}

/* =========================
   CAMPOS
========================= */
input{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:14px;
    transition:.2s;
}

input:focus{
    outline:none;
    border-color:sienna;
    box-shadow:0 0 0 3px rgba(160,82,45,.15);
}

/* =========================
   BOTÕES
========================= */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:14px;
    transition:.25s;
}

/* BOTÃO SALVAR */
.btn-primary{
    margin-top:22px;
    background:sienna;
    color:white;
}

.btn-primary:hover{
    opacity:.9;
    transform:translateY(-2px);
}

/* BOTÃO CANCELAR */
.btn-secondary{
    margin-top:10px;
    background:#f2f2f2;
    color:#444;
    border:1px solid #ddd;
}

.btn-secondary:hover{
    background:#e9e9e9;
}

/* =========================
   LINKS
========================= */
a{
    text-decoration:none;
}
</style>

</head>

<body>

<div class="card">

<h2>Editar Cliente</h2>

<form method="POST" action="/update_cliente/{{ cliente[0] }}">

    <label for="nome">Nome</label>
    <input id="nome" name="nome" value="{{ cliente[1] }}" required>

    <label for="telefone">Telefone</label>
    <input id="telefone" name="telefone" value="{{ cliente[2] }}" required>

    <label for="cpf">CPF</label>
    <input id="cpf" name="cpf" value="{{ cliente[3] }}" required>

    <label for="data_nascimento">Data de Nascimento</label>
    <input
        type="date"
        id="data_nascimento"
        name="data_nascimento"
        value="{{ cliente[4] }}">

    <label for="bairro">Bairro</label>
    <input id="bairro" name="bairro" value="{{ cliente[5] }}">

    <label for="rua">Rua</label>
    <input id="rua" name="rua" value="{{ cliente[6] }}">

    <label for="numero_casa">Número</label>
    <input id="numero_casa" name="numero_casa" value="{{ cliente[7] }}">

    <label for="cidade">Cidade</label>
    <input id="cidade" name="cidade" value="{{ cliente[8] }}">

    <label for="estado">UF</label>
    <input id="estado" name="estado" value="{{ cliente[9] }}">

    <label for="cep">CEP</label>
    <input id="cep" name="cep" value="{{ cliente[10] }}">

    <label for="complemento">Complemento</label>
    <input id="complemento" name="complemento" value="{{ cliente[11] }}">

    <button class="btn-primary">Salvar</button>

</form>

<a href="/#clientes">
    <button class="btn-secondary">Cancelar</button>
</a>

</div>

</body>
</html>
